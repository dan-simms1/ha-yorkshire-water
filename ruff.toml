target-version = "py313"
line-length = 100

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP",
    "N",
    "SIM",
    "RUF",
    "ASYNC",
    "PT",
    "PIE",
    "RET",
    "TID",
    "TRY",
    "ANN",
    "D",
]
ignore = [
    "ANN401",
    "D203",
    "D212",
    "TRY003",
    "D100",
    "D104",
    "D107",
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
"tests/**" = ["D", "ANN", "S101"]
