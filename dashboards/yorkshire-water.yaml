# Sample Lovelace dashboard for the Yorkshire Water integration (v3.0+).
#
# How to use
# ----------
# 1. Open Settings -> Dashboards -> Add Dashboard.
# 2. Choose "Take control" then paste this YAML in the dashboard
#    editor's raw configuration view.
# 3. Find-replace the placeholder account number `1234567890123456`
#    everywhere with your property's 16-digit account reference (no
#    spaces). To find it: Settings -> Devices & Services -> Yorkshire
#    Water -> your property device -> any entity, e.g. "Latest daily
#    consumption" -> the entity_id is `sensor.<account>_latest_daily_consumption`.
#    That single number keys both the entity_ids and the
#    yorkshire_water:* statistic ids the charts read.
#
# Multiple properties
# -------------------
# Copy the "Smart Meter" view, give the copy its own title/path, and
# swap the account number. Each property has its own device, entities
# and statistics.
#
# About the layout
# ----------------
# Yorkshire Water water meters report ~daily, a couple of days behind,
# so per-day and per-month history lives in long-term statistics - the
# Trends bar charts read those (yorkshire_water:* statistic ids), not
# live sensors. The tiles show genuinely-current values: the freshest
# delivered daily reading, month-to-date and year-to-date totals, plus
# meter status and leak detection.
#
# This dashboard is unofficial and not affiliated with Yorkshire Water.

title: Yorkshire Water
views:
- title: Smart Meter
  path: smart-meter
  icon: mdi:water-pump
  type: sections
  max_columns: 3
  sections:
  - type: grid
    column_span: 3
    cards:
    - type: markdown
      text_only: true
      content: '## {{ state_attr(''sensor.1234567890123456_meter_status'', ''address'') or ''Yorkshire
        Water'' }}'
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Status
      heading_style: title
      icon: mdi:water-check
    - type: tile
      entity: binary_sensor.1234567890123456_meter_active
      name: Meter
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: binary_sensor.1234567890123456_continuous_flow_alarm
      name: Leak alert
      color: red
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_last_reading_time
      name: Last reading
      color: grey
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Consumption
      heading_style: title
      icon: mdi:water
    - type: tile
      entity: sensor.1234567890123456_latest_daily_consumption
      name: Latest day
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_consumption_this_month
      name: This month
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_consumption_year_to_date
      name: Year to date
      color: blue
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Cost
      heading_style: title
      icon: mdi:currency-gbp
    - type: tile
      entity: sensor.1234567890123456_cost_this_month_total
      name: This month
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_this_month_clean_water
      name: Clean water (mth)
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_this_month_sewerage
      name: Sewerage (mth)
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_year_to_date
      name: Year to date
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Daily usage
      heading_style: title
      icon: mdi:chart-bar
    - type: statistics-graph
      title: Daily consumption
      entities:
      - yorkshire_water:daily_consumption_1234567890123456
      period: day
      stat_types:
      - state
      chart_type: bar
      days_to_show: 30
    - type: statistics-graph
      title: Daily cost
      entities:
      - yorkshire_water:daily_cost_1234567890123456
      period: day
      stat_types:
      - state
      chart_type: bar
      days_to_show: 30
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Monthly usage
      heading_style: title
      icon: mdi:calendar-month
    - type: statistics-graph
      title: Monthly consumption
      entities:
      - yorkshire_water:monthly_consumption_1234567890123456
      period: month
      stat_types:
      - state
      chart_type: bar
      days_to_show: 365
    - type: statistics-graph
      title: Monthly cost
      entities:
      - yorkshire_water:monthly_cost_1234567890123456
      period: month
      stat_types:
      - state
      chart_type: bar
      days_to_show: 365
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Diagnostics
      heading_style: title
      icon: mdi:wrench
    - type: entities
      entities:
      - entity: sensor.1234567890123456_latest_daily_consumption
        name: Latest daily reading
      - entity: sensor.1234567890123456_meter_reference
        name: Meter reference
      - entity: sensor.1234567890123456_last_reading_time
        name: Last YW reading date
      - entity: sensor.1234567890123456_last_update_time
        name: Last update time
      - entity: sensor.1234567890123456_continuous_flow_rate
        name: Continuous flow rate
      - entity: sensor.1234567890123456_continuous_flow_cost_per_day
        name: Continuous flow cost/day
      show_header_toggle: false

