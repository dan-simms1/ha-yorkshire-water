# Sample Lovelace dashboard for the Yorkshire Water integration.
#
# How to use
# ----------
# 1. Open Settings -> Dashboards -> Add Dashboard.
# 2. Choose "Take control" then paste this YAML in the dashboard
#    editor's raw configuration view.
# 3. Find-replace the placeholder `1_example_street_sometown_anywhere_ex1_1ex`
#    everywhere with your property's entity-id slug. To find your slug:
#    Settings -> Devices & Services -> Yorkshire Water -> click your
#    property device -> any entity, e.g. "Consumption yesterday" -> the
#    entity_id is `sensor.<slug>_consumption_yesterday`.
#
# Multiple properties
# -------------------
# If you have more than one property on your YW account, copy the
# "Smart Meter" view and adjust the slug for each. Each property has
# its own device in Home Assistant and its own entity-id slug
# derived from the address.
#
# "No reading" text on the Yesterday tiles
# ----------------------------------------
# The yesterday consumption / cost sensors render as Unavailable on
# days Yorkshire Water have not yet delivered a reading (their daily
# pipeline runs a day or more behind). HA's frontend uses
# "Unavailable" as a built-in label that integrations cannot override
# on a numeric sensor. If you want them to say "No reading" instead,
# install HACS frontend mushroom and swap each tile for a
# `custom:mushroom-template-card`; see dashboards/README.md.
#
# This dashboard is unofficial and not affiliated with Yorkshire Water.

title: Yorkshire Water
views:
- title: Smart Meter
  path: smart-meter
  icon: mdi:water-pump
  type: sections
  max_columns: 3
  sections:
  - type: grid
    column_span: 3
    cards:
    - type: markdown
      text_only: true
      content: '## {{ state_attr(''sensor.1234567890123456_meter_status'', ''address'') or ''Yorkshire
        Water'' }}'
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Status
      heading_style: title
      icon: mdi:water-check
    - type: tile
      entity: binary_sensor.1234567890123456_meter_active
      name: Meter
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: binary_sensor.1234567890123456_continuous_flow_alarm
      name: Leak alert
      color: red
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_last_reading_time
      name: Last reading
      color: grey
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Consumption
      heading_style: title
      icon: mdi:water
    - type: tile
      entity: sensor.1234567890123456_consumption_yesterday
      name: Yesterday
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_window_consumption
      name: Last 8 days
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cumulative_consumption
      name: Total tracked
      color: blue
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Cost
      heading_style: title
      icon: mdi:currency-gbp
    - type: tile
      entity: sensor.1234567890123456_cost_yesterday
      name: Yesterday
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cumulative_cost
      name: Total tracked
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Monthly
      heading_style: title
      icon: mdi:calendar-month
    - type: tile
      entity: sensor.1234567890123456_consumption_this_month
      name: This month
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_consumption_last_month
      name: Last month
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_this_month_total
      name: Cost this month
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_last_month_total
      name: Cost last month
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Year to date
      heading_style: title
      icon: mdi:calendar-clock
    - type: tile
      entity: sensor.1234567890123456_consumption_year_to_date
      name: Consumption YTD
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_cost_year_to_date
      name: Cost YTD
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_average_monthly_consumption
      name: Avg monthly use
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1234567890123456_average_monthly_cost
      name: Avg monthly cost
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Trends
      heading_style: title
      icon: mdi:chart-bar
    - type: statistics-graph
      title: Monthly consumption
      entities:
      - yorkshire_water:monthly_consumption_1234567890123456
      period: month
      stat_types:
      - state
      chart_type: bar
      days_to_show: 365
    - type: statistics-graph
      title: Monthly cost
      entities:
      - yorkshire_water:monthly_cost_1234567890123456
      period: month
      stat_types:
      - state
      chart_type: bar
      days_to_show: 365
    - type: statistics-graph
      title: Daily consumption
      entities:
      - yorkshire_water:daily_consumption_1234567890123456
      period: day
      stat_types:
      - state
      chart_type: bar
      days_to_show: 30
    - type: statistics-graph
      title: Daily cost
      entities:
      - yorkshire_water:daily_cost_1234567890123456
      period: day
      stat_types:
      - state
      chart_type: bar
      days_to_show: 30
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Diagnostics
      heading_style: title
      icon: mdi:wrench
    - type: entities
      entities:
      - entity: sensor.1234567890123456_meter_reference
        name: Meter reference
      - entity: sensor.1234567890123456_last_reading_time
        name: Last YW reading date
      - entity: sensor.1234567890123456_last_update_time
        name: Last update time
      - entity: sensor.1234567890123456_continuous_flow_rate
        name: Continuous flow rate
      - entity: sensor.1234567890123456_continuous_flow_cost_per_day
        name: Continuous flow cost/day
      show_header_toggle: false

