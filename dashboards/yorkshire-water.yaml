# Sample Lovelace dashboard for the Yorkshire Water integration.
#
# How to use
# ----------
# 1. Open Settings -> Dashboards -> Add Dashboard.
# 2. Choose "Take control" then paste this YAML in the dashboard
#    editor's raw configuration view.
# 3. Find-replace the placeholder `1_example_street_sometown_anywhere_ex1_1ex`
#    everywhere with your property's entity-id slug. To find your slug:
#    Settings -> Devices & Services -> Yorkshire Water -> click your
#    property device -> any entity, e.g. "Consumption today" -> the
#    entity_id is `sensor.<slug>_consumption_today`.
#
# Multiple properties
# -------------------
# If you have more than one property on your YW account, copy the
# "Smart Meter" view and adjust the slug for each. Each property has
# its own device in Home Assistant and its own entity-id slug
# derived from the address.
#
# "No reading" text on today / yesterday tiles
# --------------------------------------------
# By design these sensors render as Unavailable when YW have not yet
# delivered a reading for that calendar date (the pipeline lags ~2
# days). HA's frontend uses "Unavailable" as a built-in label that
# integrations cannot override on a numeric sensor.  If you want them
# to say "No reading" instead, install HACS frontend mushroom and
# swap each tile for a `custom:mushroom-template-card`; see
# dashboards/README.md for the template.
#
# This dashboard is unofficial and not affiliated with Yorkshire Water.

title: Yorkshire Water
views:
- title: Smart Meter
  path: smart-meter
  icon: mdi:water-pump
  type: sections
  max_columns: 3
  sections:
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Status
      heading_style: title
      icon: mdi:water-check
    - type: tile
      entity: binary_sensor.1_example_street_sometown_anywhere_ex1_1ex_meter_active
      name: Meter
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: binary_sensor.1_example_street_sometown_anywhere_ex1_1ex_continuous_flow_alarm
      name: Leak alert
      color: red
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_last_reading_time
      name: Last reading
      color: grey
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Consumption
      heading_style: title
      icon: mdi:water
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_consumption_today
      name: Today
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_consumption_yesterday
      name: Yesterday
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_recent_consumption
      name: Last 8 days
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_consumption
      name: Total tracked
      color: blue
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Cost
      heading_style: title
      icon: mdi:currency-gbp
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_cost_today
      name: Today
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_cost_yesterday
      name: Yesterday
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_cost
      name: Total tracked
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Monthly
      heading_style: title
      icon: mdi:calendar-month
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_consumption_this_month
      name: This month
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_consumption_last_month
      name: Last month
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_total_cost_this_month
      name: Cost this month
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_total_cost_last_month
      name: Cost last month
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Year to date
      heading_style: title
      icon: mdi:calendar-clock
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_consumption_year_to_date
      name: Consumption YTD
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_cost_year_to_date
      name: Cost YTD
      color: green
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_average_monthly_consumption
      name: Avg monthly use
      color: blue
      vertical: true
      tap_action:
        action: more-info
    - type: tile
      entity: sensor.1_example_street_sometown_anywhere_ex1_1ex_average_monthly_cost
      name: Avg monthly cost
      color: green
      vertical: true
      tap_action:
        action: more-info
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Trends
      heading_style: title
      icon: mdi:chart-bar
    - type: statistics-graph
      title: Monthly consumption
      entities:
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_consumption
      period: month
      stat_types:
      - change
      chart_type: bar
      days_to_show: 365
    - type: statistics-graph
      title: Monthly cost
      entities:
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_cost
      period: month
      stat_types:
      - change
      chart_type: bar
      days_to_show: 365
    - type: statistics-graph
      title: Daily consumption
      entities:
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_consumption
      period: day
      stat_types:
      - change
      chart_type: line
      days_to_show: 30
    - type: statistics-graph
      title: Daily cost
      entities:
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_cumulative_cost
      period: day
      stat_types:
      - change
      chart_type: line
      days_to_show: 30
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Diagnostics
      heading_style: title
      icon: mdi:wrench
    - type: entities
      entities:
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_meter_reference
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_last_reading_time
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_last_update_time
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_continuous_flow_rate
      - sensor.1_example_street_sometown_anywhere_ex1_1ex_continuous_flow_cost_per_day
      show_header_toggle: false

